  <line x1="36" y1="58" x2="92" y2="58" stroke="url(#glow)" stroke-width="2"/>
  <line x1="40" y1="44" x2="88" y2="44" stroke="url(#glow)" stroke-width="1.5"/>
  <line x1="40" y1="72" x2="88" y2="72" stroke="url(#glow)" stroke-width="1.5"/>
  <!-- AI sparkle -->
  <circle cx="88" cy="88" r="16" fill="#7c3aed" stroke="#a78bfa" stroke-width="2"/>
  <text x="88" y="93" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="sans-serif">AI</text>
